<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Wayfarer — Trip Planner</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">

    <!-- ============ SIDEBAR ============ -->
    <aside id="sidebar">
      <header class="sb-header">
        <div class="brand">
          <div class="brand-mark">🧭</div>
          <div>
            <h1>Wayfarer</h1>
            <p class="brand-sub">Backpacking route planner</p>
          </div>
        </div>
      </header>

      <section class="trip-dates">
        <div class="field">
          <label for="trip-start">Trip start</label>
          <input type="date" id="trip-start" />
        </div>
        <div class="field">
          <label for="trip-end">Trip end</label>
          <input type="date" id="trip-end" />
        </div>
      </section>

      <section class="nights-budget">
        <div class="nights-bar-wrap">
          <div class="nights-bar"><div class="nights-fill" id="nights-fill"></div></div>
          <span id="nights-label" class="nights-label">0 / 0 nights</span>
        </div>
        <button id="btn-balance" class="btn btn-ghost btn-xs" title="Distribute unallocated nights across your longest stops">Auto-balance</button>
      </section>

      <section class="add-stop">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M14 14l4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          <input type="text" id="place-search" placeholder="Add a destination — city, town, landmark…" autocomplete="off" />
          <div id="search-results" class="search-results hidden"></div>
        </div>
      </section>

      <section id="stops-list" class="stops-list"></section>

      <footer class="sb-footer">
        <button id="btn-optimize" class="btn btn-primary">
          <svg viewBox="0 0 20 20" fill="none"><path d="M3 14c3.5 0 3.5-8 7-8s3.5 8 7 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><circle cx="3" cy="14" r="1.8" fill="currentColor"/><circle cx="17" cy="14" r="1.8" fill="currentColor"/></svg>
          Optimize route
        </button>
        <div class="footer-row">
          <button id="btn-export" class="btn btn-ghost btn-sm">Export</button>
          <button id="btn-import" class="btn btn-ghost btn-sm">Import</button>
          <button id="btn-reset" class="btn btn-ghost btn-sm">Reset</button>
          <input type="file" id="import-file" accept=".json" hidden />
        </div>
      </footer>
    </aside>

    <!-- ============ MAIN ============ -->
    <main id="main">
      <nav class="view-tabs">
        <button class="view-tab active" data-view="map">Map</button>
        <button class="view-tab" data-view="itinerary">Itinerary</button>
        <div class="trip-stats" id="trip-stats"></div>
        <button id="btn-print" class="btn btn-ghost btn-sm no-print">Print itinerary</button>
      </nav>

      <div id="view-map" class="view active">
        <div id="map"></div>
      </div>

      <div id="view-itinerary" class="view">
        <div id="itinerary" class="itinerary"></div>
      </div>

    </main>
  </div>

  <!-- ============ EXPLORE DRAWER (body-level so it can overlay any view) ============ -->
  <div id="explore" class="explore hidden">
    <div class="explore-head">
      <div>
        <h2 id="explore-title">City</h2>
        <p id="explore-sub" class="explore-sub"></p>
      </div>
      <button id="explore-close" class="icon-btn" title="Close">✕</button>
    </div>
    <div class="explore-links" id="explore-links"></div>
    <nav class="explore-tabs">
      <button class="explore-tab active" data-tab="hostels">🛏 Hostels</button>
      <button class="explore-tab" data-tab="food">🍴 Food &amp; drink</button>
      <button class="explore-tab" data-tab="activities">🎟 Things to do</button>
    </nav>
    <div id="explore-body" class="explore-body"></div>
  </div>

  <!-- ============ MOBILE BOTTOM NAV ============ -->
  <nav id="mobile-nav" class="mobile-nav">
    <button data-mview="stops" class="active">🧭<span>Stops</span></button>
    <button data-mview="map">🗺️<span>Map</span></button>
    <button data-mview="itinerary">📅<span>Itinerary</span></button>
  </nav>

  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/data.js"></script>
  <!-- optional, gitignored: personal preloaded trip (window.LOCAL_TRIP) -->
  <script src="js/trip.local.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
